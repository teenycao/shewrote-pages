<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>她们的星空 · 867 位中国古代女诗人</title>
<style>
  :root { --paper:#F8F5EC; --ink-night:#0D131A; --red:#C9524C; --dim:#8A8579; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; background:var(--ink-night); overflow:hidden;
    font-family:"Songti SC","STSong","Noto Serif CJK SC",serif; }
  canvas { display:block; cursor:crosshair; }
  .ui { position:fixed; color:var(--paper); user-select:none; }
  #title { top:22px; left:24px; }
  #title h1 { font-size:22px; font-weight:600; letter-spacing:6px; }
  #title p { font-size:12px; color:var(--dim); margin-top:8px; letter-spacing:2px; }
  #tagline { top:150px; left:24px; font-size:12.5px; color:var(--dim);
    letter-spacing:2.5px; opacity:0; transition:opacity 2.5s; pointer-events:none; }
  #controls { top:76px; left:24px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; max-width:70vw; }
  #q { background:rgba(248,245,236,.07); border:1px solid rgba(248,245,236,.25); color:var(--paper);
    padding:7px 12px; font-size:14px; width:190px; border-radius:2px; outline:none;
    font-family:inherit; letter-spacing:1px; }
  #q::placeholder { color:rgba(248,245,236,.35); }
  #q:focus { border-color:var(--red); }
  button { background:none; border:1px solid rgba(248,245,236,.25); color:var(--dim); padding:7px 14px;
    font-size:13px; font-family:inherit; letter-spacing:2px; cursor:pointer; border-radius:2px; }
  button.on { border-color:var(--red); color:var(--red); }
  #msg { font-size:12.5px; color:var(--red); letter-spacing:1px; min-height:16px; width:100%; }
  #card { bottom:56px; left:24px; width:300px; max-width:calc(100vw - 48px);
    background:rgba(13,19,26,.92); border:1px solid rgba(248,245,236,.18); border-left:3px solid var(--red);
    padding:16px 18px; display:none; backdrop-filter:blur(4px); }
  #card h2 { font-size:19px; font-weight:600; letter-spacing:3px; }
  #card .py { font-size:11px; color:var(--dim); letter-spacing:1px; margin-top:2px; }
  #card .meta { font-size:12px; color:var(--dim); margin-top:8px; line-height:1.8; }
  #card .poem { margin-top:10px; padding-top:10px; border-top:1px solid rgba(248,245,236,.12); }
  #card .poem .t { font-size:12px; color:var(--dim); }
  #card .poem .l { font-size:14.5px; margin-top:4px; line-height:1.7; letter-spacing:1px; }
  #card .close { position:absolute; top:8px; right:12px; color:var(--dim); cursor:pointer; font-size:14px; }
  #foot { bottom:16px; left:24px; font-size:11px; color:rgba(138,133,121,.6); letter-spacing:1px; }
  #foot a { color:rgba(138,133,121,.85); text-decoration:none; border-bottom:1px dotted; }
  #fogtip { display:none; position:fixed; background:rgba(13,19,26,.94); border:1px solid rgba(248,245,236,.18);
    color:var(--dim); font-size:12.5px; padding:10px 14px; max-width:240px; line-height:1.8; letter-spacing:1px; pointer-events:none; }
  @media (max-width:640px){
    #title h1{font-size:18px; letter-spacing:4px;} #controls{top:66px;} #tagline{top:140px; font-size:11.5px;} #q{width:130px;}
    #card{bottom:44px;}
  }
</style>
</head>
<body>
<canvas id="sky"></canvas>
<div class="ui" id="title"><h1>她们的星空</h1><p>867 位中国古代女诗人 · 先秦至清</p></div>
<div class="ui" id="tagline">这片天空里,大多数星,一生只亮过一次。</div>
<div class="ui" id="controls">
  <input id="q" placeholder="搜:猫 / 梅 / 梦" autocomplete="off">
  <button id="kinBtn">星座</button>
  <span id="msg"></span>
</div>
<div class="ui" id="card"><span class="close" onclick="closeCard()">✕</span><div id="cardBody"></div></div>
<div class="ui" id="foot">数据:「中国古代才女」数据集 · <a href="https://github.com/teenycao/shewrote" target="_blank" rel="noopener noreferrer">github.com/teenycao/shewrote</a></div>
<div id="fogtip"></div>
<script src="starmap_data.js"></script>
<script>
const cv = document.getElementById('sky'), ctx = cv.getContext('2d');
const DPR = Math.min(window.devicePixelRatio || 1, 2);
let W, H;
const Y0 = -500, Y1 = 1960;                 // 时间轴范围
const women = STAR_DATA.women, kin = STAR_DATA.kin;
const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const byId = {}; women.forEach(w => byId[w.id] = w);

function hash(s){ let h = 2166136261; for (const c of s){ h ^= c.charCodeAt(0); h = Math.imul(h, 16777619); } return (h >>> 0) / 4294967295; }

let stars = [], fog = [];
function layout(){
  W = innerWidth; H = innerHeight;
  cv.width = W * DPR; cv.height = H * DPR; cv.style.width = W + 'px'; cv.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  const top = H * 0.17, bottom = H * 0.86, left = 30, right = W - 30;
  stars = women.map(w => {
    const jx = (hash(w.id + 'x') - 0.5) * 26;
    const x = left + (Math.min(Math.max(w.y, Y0), Y1) - Y0) / (Y1 - Y0) * (right - left) + jx;
    const y = top + hash(w.id + 'y') * (bottom - top);
    const r = Math.min(1.1 + Math.sqrt(w.np) * 0.55, 7);
    return { w, x, y, r, ph: hash(w.id + 'p') * Math.PI * 2, sp: 0.4 + hash(w.id + 's') * 1.2 };
  });
  // 某氏之雾:右下角一团无名微粒
  fog = [];
  const fx = Math.max(W * 0.17, 120), fy = H * 0.72;
  for (let i = 0; i < 60; i++){
    const a = hash('f' + i) * Math.PI * 2, d = Math.sqrt(hash('g' + i)) * Math.min(W * 0.07, 62);
    fog.push({ x: fx + Math.cos(a) * d * 1.4, y: fy + Math.sin(a) * d, r: 0.5 + hash('h' + i) * 1.1, ph: hash('i' + i) * 6.28 });
  }
  fog.cx = fx; fog.cy = fy;
}
layout(); addEventListener('resize', layout);

const ERAS = [["汉", 25], ["唐", 800], ["宋", 1120], ["元", 1300], ["明", 1520], ["清", 1780]];
let matched = null, kinMode = false, selected = null, hovered = null, t0 = performance.now();

function draw(now){
  const t = (now - t0) / 1000;
  ctx.clearRect(0, 0, W, H);
  // 底色微渐变
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#0D131A'); g.addColorStop(1, '#111A23');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  // 时代刻度
  ctx.textAlign = 'center'; ctx.font = '12px Songti SC, serif';
  for (const [name, yr] of ERAS){
    const x = 30 + (yr - Y0) / (Y1 - Y0) * (W - 60);
    ctx.strokeStyle = 'rgba(248,245,236,0.05)'; ctx.beginPath();
    ctx.moveTo(x, H * 0.14); ctx.lineTo(x, H * 0.88); ctx.stroke();
    ctx.fillStyle = 'rgba(138,133,121,0.55)'; ctx.fillText(name, x, H * 0.915);
  }
  // 星座连线
  if (kinMode){
    ctx.strokeStyle = 'rgba(201,82,76,0.35)'; ctx.lineWidth = 0.7;
    const pos = {}; stars.forEach(s => pos[s.w.id] = s);
    for (const [a, b] of kin){
      const A = pos[a], B = pos[b];
      if (A && B){ ctx.beginPath(); ctx.moveTo(A.x, A.y); ctx.lineTo(B.x, B.y); ctx.stroke(); }
    }
  }
  const kinSet = kinMode ? new Set(kin.flatMap(k => [k[0], k[1]])) : null;
  // 星
  for (const s of stars){
    const tw = 0.72 + Math.sin(t * s.sp + s.ph) * 0.28;
    let alpha = tw, color = '248,245,236';
    if (matched){ alpha = matched.has(s.w.id) ? 1 : 0.06; if (matched.has(s.w.id)) color = '235,180,120'; }
    if (kinSet){ alpha = kinSet.has(s.w.id) ? 1 : 0.10; }
    if (s === hovered || (selected && s.w.id === selected.id)){ color = '201,120,110'; alpha = 1; }
    ctx.fillStyle = `rgba(${color},${alpha})`;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, 6.283); ctx.fill();
    if (alpha === 1 && (matched || s === hovered || (selected && s.w.id === selected.id))){
      ctx.strokeStyle = `rgba(${color},0.35)`; ctx.beginPath(); ctx.arc(s.x, s.y, s.r + 3.5, 0, 6.283); ctx.stroke();
      if (s.r > 2.2 || matched){
        ctx.fillStyle = `rgba(${color},0.9)`; ctx.font = '13px Kaiti SC, Songti SC, serif';
        ctx.fillText(s.w.n, s.x, s.y - s.r - 7);
      }
    }
  }
  // 某氏之雾
  ctx.fillStyle = 'rgba(138,133,121,0.4)'; ctx.font = '11px Songti SC, serif'; ctx.textAlign = 'center';
  ctx.fillText('某氏 · 376 首无名之诗', fog.cx, fog.cy + Math.min(W * 0.07, 62) + 22);
  for (const f of fog){
    const tw = 0.10 + Math.sin(t * 0.6 + f.ph) * 0.05;
    ctx.fillStyle = `rgba(158,152,138,${matched || kinMode ? tw * 0.4 : tw})`;
    ctx.beginPath(); ctx.arc(f.x + Math.sin(t * 0.3 + f.ph) * 2, f.y + Math.cos(t * 0.25 + f.ph) * 1.5, f.r, 0, 6.283); ctx.fill();
  }
  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);
setTimeout(() => document.getElementById('tagline').style.opacity = 1, 800);

// 命中检测
function pick(mx, my){
  let best = null, bd = 144;
  for (const s of stars){
    const d = (s.x - mx) ** 2 + (s.y - my) ** 2;
    if (d < bd){ bd = d; best = s; }
  }
  return best;
}
const fogtip = document.getElementById('fogtip');
cv.addEventListener('mousemove', e => {
  hovered = pick(e.clientX, e.clientY);
  cv.style.cursor = hovered ? 'pointer' : 'crosshair';
  const df = (e.clientX - fog.cx) ** 2 + (e.clientY - fog.cy) ** 2;
  if (df < 5000){
    fogtip.style.display = 'block';
    fogtip.style.left = Math.min(e.clientX + 14, innerWidth - 260) + 'px';
    fogtip.style.top = (e.clientY - 60) + 'px';
    fogtip.innerHTML = `还有 ${STAR_DATA.meta.shi_poems} 首诗,署名只是「某氏」。<br>韩氏、李氏、王氏……${STAR_DATA.meta.shi_names} 个姓,不知多少人。<br>她们不在任何一颗星里。`;
  } else fogtip.style.display = 'none';
});
cv.addEventListener('click', e => {
  const s = pick(e.clientX, e.clientY);
  if (s) showCard(s.w); else closeCard();
});

function showCard(w){
  selected = w;
  const yrs = (w.b || w.d) ? `${w.b || '?'} – ${w.d || '?'}` : '生卒不详';
  document.getElementById('cardBody').innerHTML = `
    <h2>${esc(w.n)}</h2><div class="py">${w.py || ''}</div>
    <div class="meta">${esc(w.dy)} · ${esc(yrs)}${w.pl ? ' · ' + w.pl : ''}<br>
      存世 ${w.np} 首${w.np === 1 ? ' —— 一生只亮过这一次' : ''}${w.al > 1 ? ` · ${w.al} 个名字` : ''}</div>
    ${w.rl ? `<div class="poem"><div class="t">《${esc(w.rt)}》</div><div class="l">${esc(w.rl)}</div></div>` : ''}`;
  document.getElementById('card').style.display = 'block';
}
function closeCard(){ selected = null; document.getElementById('card').style.display = 'none'; }

// 搜索
const q = document.getElementById('q'), msg = document.getElementById('msg');
q.addEventListener('input', () => {
  const v = q.value.trim();
  if (!v){ matched = null; msg.textContent = ''; return; }
  matched = new Set(women.filter(w => w.s.includes(v)).map(w => w.id));
  msg.textContent = matched.size ? `「${v}」· ${matched.size} 位诗人的星亮了` : `「${v}」· 这片天空里还没有`;
});
// 星座模式
const kb = document.getElementById('kinBtn');
kb.addEventListener('click', () => {
  kinMode = !kinMode; kb.classList.toggle('on', kinMode);
  msg.textContent = kinMode ? `${kin.length} 对亲缘 · 135 人连成星座 —— 才女从不是孤星` : '';
});
</script>
</body>
</html>
